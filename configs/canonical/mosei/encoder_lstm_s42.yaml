phase: CANONICAL
dataset: mosei
ablation_name: encoder_lstm
model_type: canonical_text_audio_awaf_slstm
seed: 42
epochs: 12
min_epochs: 3
early_stopping_patience: 4
notes: 'MOSEI Canonical: fusion=awaf, encoder=lstm'
data:
  csv_path: data/processed/mosei_full/label.csv
  dataset: mosei
  feature_root: data/processed/mosei_full
  formal_mode: true
model:
  mode: canonical_text_audio_awaf_slstm
  audio_dim: 74
  hidden_dim: 256
  slstm_num_layers: 1
  slstm_dropout: 0.2
  text_model_name: roberta-large
  text_mlp_hidden: 512
  text_dropout: 0.1
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_targets:
  - query
  - value
  tau_init: 3.0
  awaf_dropout: 0.1
  use_modality_dropout: true
  modality_dropout_prob: 0.1
  use_modal_layernorm: true
  freeze_text_base: false
  fusion_type: awaf
  temporal_encoder: lstm
training:
  batch_size: 8
  grad_accum_steps: 8
  epochs: 12
  early_stopping_patience: 4
  min_epochs: 3
  lr: 3.0e-05
  lr_text_lora: 3.0e-06
  weight_decay: 0.03
  seed: 42
  test_final_once: true
